<script>
var SHEET_ID = '1oEPk5uZSEESxbbc2gErFVoiggHqUj5sOWjWEqcGbJVQ';
var PLAYER_SHEETS = [
  "Dam's 1","Stan 1","Léna 1","Chloé 1","Jeje 1","Clara 1","Micka 1","Ricco 1",
  "Goyt 1","Noe 1","Pata 1","Marina 1","Vero 1","Erwan 1","Hugo 1","Shervan 1",
  "Laura 1","Greg 1","Nikola 1","Paco 1","Cyrille 1","Joris 1","Steph 1","Mathys 1",
  "Aymeric 1","Kalash 1","Jess 1","Hugo.O 1"
];

function norm(s){return s?s.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim():'';}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function toNum(v){var n=parseFloat(v);return isNaN(n)?0:n;}

function fetchSheet(name){
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&headers=0&sheet='+encodeURIComponent(name);
  return fetch(url).then(function(r){return r.text();}).then(function(t){
    var m=t.match(/setResponse\(([\s\S]*)\);?\s*$/);
    if(!m) throw new Error('Réponse invalide pour "'+name+'"');
    var json=JSON.parse(m[1]);
    return (json.table.rows||[]).map(function(row){
      return (row.c||[]).map(function(cell){
        if(!cell||cell.v===null||cell.v===undefined) return '';
        var v=cell.v;
        if(typeof v==='string'&&v.indexOf('Date(')===0){
          var n=v.slice(5,-1).split(',').map(Number);
          return new Date(n[0],n[1],n[2]).toISOString().slice(0,10);
        }
        return v;
      });
    });
  });
}

function parseClassement(rows){
  var cl=[],qm={},mode='main';
  for(var i=1;i<80&&i<rows.length;i++){
    var r=rows[i]||[],name=r[1];
    if(!name) continue;
    if(typeof name==='string'&&name.indexOf('Points pris')===0){mode='qualif';continue;}
    if(name==='Joueurs') continue;
    var n=String(name).trim();
    if(mode==='main') cl.push({name:n,correct:toNum(r[2]),exact:toNum(r[3]),points:toNum(r[4])});
    else qm[n]=toNum(r[2]);
  }
  return{classement:cl,qualifMap:qm};
}

function parsePlayerSheet(rows){
  var name=(rows[0]&&rows[0][1])||'';
  if(typeof name==='string'&&name.indexOf('Joueur :')===0) name=name.replace('Joueur :','').trim();
  var matches=[],block=[],curPoule=null;
  function flush(){
    if(!block.length) return;
    var teams={};
    block.forEach(function(r){
      if(r[0]&&typeof r[0]==='string'&&r[0].indexOf('Equipe')===0&&r[1])
        teams[r[0].replace('Equipe','').trim()]=String(r[1]).trim();
    });
    block.forEach(function(r){
      var rencontre=r[4];
      if(!rencontre||typeof rencontre!=='string'||rencontre.indexOf(' vs ')<0) return;
      var parts=rencontre.split(' vs ').map(function(s){return s.trim();});
      var prono        =(r[5] ||'').toString().trim(); /* F */
      var boosterOui   =(r[11]||'').toString().trim().toLowerCase(); /* L = "oui" si booster validé */
      var vainqueur    =(r[9] ||'').toString().trim(); /* J = A/B/N quand joué, "…" sinon */
      var played       = vainqueur!==''&&vainqueur!=='...'&&vainqueur!=='null';
      var correct      = played&&prono!==''&&prono!=='...'&&prono===vainqueur;
      var booster_pts  = boosterOui==='oui'?50:0; /* pour affichage, déjà inclus dans r[12] */
      matches.push({
        poule:curPoule, date:r[3]||null, match:rencontre,
        team_a:teams[parts[0]]||null, team_a_n:teams[parts[0]]?norm(teams[parts[0]]):null,
        team_b:teams[parts[1]]||null, team_b_n:teams[parts[1]]?norm(teams[parts[1]]):null,
        prono:prono,
        cote:(r[8]||'').toString().trim(), /* I = "1-3", "2-3", "nul"… */
        vainqueur:vainqueur, resultScore:(r[10]||'').toString().trim(),
        boosterLabel:(r[7]||'').toString().trim(),
        booster_pts:booster_pts,
        played:played, correct:correct,
        points:toNum(r[12]) /* M = pts totaux match, boosters déjà inclus */
      });
    });
  }
  for(var i=5;i<rows.length;i++){
    var rw=rows[i]||[];
    if(rw[0]&&typeof rw[0]==='string'&&rw[0].indexOf('Poule')===0){flush();block=[];curPoule=rw[0];continue;}
    block.push(rw);
  }
  flush();
  return{name:name.trim()||null,matches:matches};
}

/*
  AUDACE via colonne côte (I = r[8]) — lecture directe, sans besoin de team_info.
  Format côte : "X-Y" = joueur a parié rang X gagne sur rang Y
    Y-X ≥ 2  → SAFE    (favori ≥2 rangs)  aud=0,  p=72%
    Y-X = 1  → MS      (favori 1 rang)    aud=25, p=56%
    Y-X = 0  → MS      (égaux)            aud=25, p=50%
    Y-X = -1 → MR      (outsider 1 rang)  aud=75, p=40%
    Y-X ≤ -2 → RISQUÉ  (outsider ≥2 rang) aud=100,p=20%
  Côte "nul" → NUL déséquilibré par défaut : aud=50, p=15%
*/
function getAP(m){
  var prono=m.prono;
  if(!prono||prono==='...') return null;
  var cote=(m.cote||'').toLowerCase().trim();
  if(!cote||cote==='...') return null;
  /* NUL */
  if(prono.toUpperCase()==='N'){
    if(cote==='nul') return{a:50,p:0.15};
    /* si côte encode la rencontre quand même */
    var np=cote.split('-').map(Number);
    if(np.length===2&&!isNaN(np[0])&&!isNaN(np[1])){
      return Math.abs(np[1]-np[0])<=1?{a:0,p:0.26}:{a:50,p:0.15};
    }
    return{a:50,p:0.15};
  }
  /* Non-NUL : côte = "gagnant_rang-perdant_rang" */
  if(cote==='nul') return null; /* incohérent */
  var cp=cote.split('-').map(Number);
  if(cp.length!==2||isNaN(cp[0])||isNaN(cp[1])) return null;
  var diff=cp[1]-cp[0]; /* positif = pari sur le favori */
  if(diff>=2)  return{a:0,  p:0.72};
  if(diff===1) return{a:25, p:0.56};
  if(diff===0) return{a:25, p:0.50};
  if(diff===-1)return{a:75, p:0.40};
  return          {a:100,p:0.20};
}

function computeRisk(matches){
  var aSum=0,aCnt=0,actS=0,expS=0,pCnt=0;
  matches.forEach(function(m){
    var ap=getAP(m);if(!ap)return;
    aSum+=ap.a;aCnt++;
    if(m.played){actS+=m.correct?1:0;expS+=ap.p;pCnt++;}
  });
  return{
    audace:aCnt>0?Math.round(aSum/aCnt):50,
    adjR:pCnt>0?Math.round(clamp((actS/pCnt-expS/pCnt)*100,-85,52)):0
  };
}

window.__loadAllData=function(){
  /* Plus besoin de fetcher Equipes — côte lue directement depuis les onglets joueurs */
  return Promise.all(
    [fetchSheet('Classement')].concat(PLAYER_SHEETS.map(fetchSheet))
  ).then(function(results){
    var parsed=parseClassement(results[0]);
    var classement=parsed.classement,qualifMap=parsed.qualifMap;

    var pData={};
    results.slice(1).forEach(function(rows){
      var p=parsePlayerSheet(rows);
      if(p.name) pData[norm(p.name)]=p.matches;
    });

    var refKey=Object.keys(pData).find(function(k){return pData[k].length>0;})||'';
    var refM=pData[refKey]||[];

    /* nMatchsJoues = lignes avec vainqueur rempli (col J) */
    var nMatchsJoues=refM.filter(function(m){return m.played;}).length;

    /* Journées */
    var byDate={};
    refM.forEach(function(m){if(!m.date)return;if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);});
    var allDates=Object.keys(byDate).sort();
    var playedDates  =allDates.filter(function(d){return byDate[d].some(function(m){return m.played;});});
    var completedDates=allDates.filter(function(d){return byDate[d].length>0&&byDate[d].every(function(m){return m.played;});});

    /* Pour le delta de rang : comparer dernière journée complète vs avant-dernière */
    var dFD=completedDates.length>0?completedDates:playedDates;
    var lastJ=dFD.length>0?dFD[dFD.length-1]:null;
    var prevJ=dFD.length>1?dFD[dFD.length-2]:null;

    function cumPts(matches,upto){
      if(!upto)return 0;
      return matches.reduce(function(s,m){return s+(m.date&&m.date<=upto?m.points:0);},0);
    }

    var out=classement.map(function(e){
      var matches=pData[norm(e.name)]||[];
      var qualif_pts=qualifMap[e.name]||0;
      var total_points=(e.points||0)+qualif_pts; /* e.points inclut déjà les boosters */
      var booster_pts=matches.reduce(function(s,m){return s+(m.booster_pts||0);},0);
      var risk=computeRisk(matches);
      var missedPronos=matches.filter(function(m){return m.played&&(!m.prono||m.prono==='...');}).length;
      return{
        name:e.name, points:total_points,
        correct:e.correct||0, exact:e.exact||0,
        boosters:booster_pts,
        audace:risk.audace, adjR:risk.adjR,
        missedPronos:missedPronos, nMatchs:nMatchsJoues,
        matches:matches,
        _ptsNow:qualif_pts+cumPts(matches,lastJ),
        _ptsPrev:qualif_pts+cumPts(matches,prevJ)
      };
    });

    /* Delta rang : avant-dernière journée → dernière journée */
    if(prevJ){
      var bN=out.slice().sort(function(a,b){return b._ptsNow-a._ptsNow;});
      var bP=out.slice().sort(function(a,b){return b._ptsPrev-a._ptsPrev;});
      var rN={},rP={};
      bN.forEach(function(p,i){rN[p.name]=i+1;});
      bP.forEach(function(p,i){rP[p.name]=i+1;});
      out.forEach(function(p){p.delta=(rP[p.name]||0)-(rN[p.name]||0);});
    } else {
      out.forEach(function(p){p.delta=0;});
    }

    return{players:out,nMatchs:nMatchsJoues,playedDates:playedDates,completedDates:completedDates};
  });
};
</script>

  }

              var gs=["linear-gradient(135deg,#ECA0B828,#FDFCF9)","linear-gradient(135deg,#F0C07028,#FDFCF9)","linear-gradient(135deg,#A8D0C028,#FDFCF9)"];
              var cs=[WHEEL[0],WHEEL[2],WHEEL[3]];
              return<div key={p.name} style={{flex:1,border:"1px solid "+P.line,padding:"14px 16px",background:gs[i],position:"relative",overflow:"hidden"}}>
                <span className="mono" style={{position:"absolute",top:2,right:8,fontSize:34,fontWeight:700,color:cs[i]+"22",lineHeight:1}}>{i+1}</span>
                <p className="mono" style={{color:cs[i],fontSize:8,letterSpacing:"0.2em",marginBottom:4}}>#{i+1}</p>
                <p className="serif" style={{color:P.text,fontSize:17,marginBottom:2}}>{p.name}</p>
                {p.delta!==0&&<p className="mono" style={{color:p.delta>0?"#A8C490":"#E8A098",fontSize:8,marginBottom:2}}>{p.delta>0?"↑":"↓"}{Math.abs(p.delta)}</p>}
                <p className="mono" style={{color:P.text,fontSize:22,fontWeight:700,lineHeight:1,marginTop:4}}>{p.points}<span style={{fontSize:9,color:P.muted,fontWeight:400}}> PTS</span></p>
                <p className="mono" style={{color:P.muted,fontSize:8,marginTop:6}}>
                  {p.correct} correct{p.correct!==1?"s":""}
                  {p.boosters>0&&<span style={{marginLeft:6,background:"linear-gradient(90deg,#ECA0B838,transparent)",padding:"1px 5px"}}>+{p.boosters} boost</span>}
                </p>
              </div>;
            })}
          </div>
          <div style={{display:"flex",flexDirection:"column"}}>
            {players.slice(3).map(function(p,i){
              var rk=i+4,last=rk>players.length-3,c=WHEEL[rk%WHEEL.length];
              return<div key={p.name} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderBottom:"1px solid "+P.line+"44",background:last?"#F2DADA22":"transparent"}}>
                <span className="mono" style={{color:P.muted,fontSize:8,width:22,flexShrink:0}}>{("0"+rk).slice(-2)}</span>
                <div style={{width:5,height:5,borderRadius:"50%",background:last?"#C8A0A0":c,flexShrink:0}}/>
                <span className="serif" style={{color:last?"#A88080":P.text,fontSize:13,flex:1}}>{p.name}</span>
                {p.delta!==0
                  ?<span className="mono" style={{color:p.delta>0?"#A8C490":"#E8A098",fontSize:8,width:28,textAlign:"right",flexShrink:0}}>{p.delta>0?"↑":"↓"}{Math.abs(p.delta)}</span>
                  :<span style={{width:28,flexShrink:0}}/>}
                <span className="mono" style={{color:P.muted,fontSize:8,width:36,flexShrink:0,textAlign:"right"}}>{p.correct} corr.</span>
                {p.boosters>0?<span className="mono" style={{fontSize:7,background:"linear-gradient(90deg,#ECA0B838,transparent)",padding:"1px 5px",color:P.muted,width:48,flexShrink:0,textAlign:"right"}}>+{p.boosters} bst</span>:<span style={{width:48,flexShrink:0}}/>}
                <span className="mono" style={{color:last?"#C09090":P.text,fontSize:13,fontWeight:700,width:36,textAlign:"right",flexShrink:0}}>{p.points}</span>
                <span className="mono" style={{color:P.muted,fontSize:7,width:16}}>PTS</span>
              </div>;
            })}
          </div>
        </div>}

        {/* PROGRESSION */}
        {tab==="Progression"&&<div style={{background:P.card,padding:"18px 22px"}}>
          <ST>Évolution du rang · par journée · cliquer pour isoler</ST>
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:14}}>
            {players.map(function(p,i){var col=WHEEL[i%WHEEL.length],iF=focused.indexOf(p.name)>=0,on=focused.length===0||iF;return<button key={p.name} onClick={function(){tog(p.name);}} style={{display:"flex",alignItems:"center",gap:4,padding:"2px 8px",cursor:"pointer",border:"1px solid "+(iF?col:P.line),background:iF?col+"18":"transparent",opacity:on?1:0.22}}><div style={{width:5,height:5,borderRadius:"50%",background:col}}/><span className="mono" style={{color:iF?col:P.text,fontSize:8,fontWeight:iF?700:400}}>{p.name}</span></button>;})}
            {focused.length>0&&<button onClick={function(){setFocused([]);}} style={{padding:"2px 8px",border:"1px solid "+P.muted,background:"transparent",cursor:"pointer"}}><span className="mono" style={{color:P.muted,fontSize:8}}>✕</span></button>}
          </div>
          {progData.length===0?<p className="mono" style={{color:P.muted,fontSize:8}}>Aucune journée disponible.</p>
            :<div><p className="mono" style={{color:P.muted,fontSize:7,marginBottom:8,letterSpacing:"0.1em"}}>#1 EN HAUT · ⟳ EN COURS</p>
              <ResponsiveContainer width="100%" height={340}>
                <LineChart data={progData} margin={{top:10,right:20,left:0,bottom:10}}>
                  <CartesianGrid stroke={P.line} strokeOpacity={0.4}/>
                  <XAxis dataKey="j" tick={{fill:P.muted,fontSize:9,fontFamily:"'Space Mono',monospace"}} axisLine={{stroke:P.line}} tickLine={false}/>
                  <YAxis reversed domain={[1,players.length||28]} tick={{fill:P.muted,fontSize:8,fontFamily:"'Space Mono',monospace"}} axisLine={false} tickLine={false}/>
                  <Tooltip contentStyle={TT} formatter={function(v,n){return["#"+v,n];}}/>
                  {players.map(function(p,i){var col=WHEEL[i%WHEEL.length],iF=focused.indexOf(p.name)>=0,on=focused.length===0||iF;return<Line key={p.name} type="linear" dataKey={p.name} stroke={col} strokeWidth={iF?2.5:on?1.2:0.6} strokeOpacity={on?1:0.04} dot={false} legendType="none"/>;})}</LineChart>
              </ResponsiveContainer>
            </div>}
        </div>}

        {/* RISQUES */}
        {tab==="Risques"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{background:P.card,padding:"18px 22px"}}>
            <div style={{position:"relative",height:420}}>
              {ZONES.map(function(z){var pos=Object.assign({position:"absolute"},z.corner);return<div key={z.key} style={Object.assign({},pos,{textAlign:z.align,pointerEvents:"none",zIndex:2,padding:"3px 7px",border:"1px solid "+z.c+"66",background:P.card+"F0"})}><p className="mono" style={{color:z.c,fontSize:8,fontWeight:700,letterSpacing:"0.14em"}}>{z.label}</p></div>;})}
              <ResponsiveContainer width="100%" height={420}>
                <ScatterChart margin={{top:24,right:48,left:48,bottom:30}}>
                  {ZONES.map(function(z){return<ReferenceArea key={z.key} x1={z.x1} x2={z.x2} y1={z.y1} y2={z.y2} fill={z.c} fillOpacity={0.13}/>;})}<ReferenceLine x={50} stroke={P.muted} strokeDasharray="4 4" strokeWidth={1}/><ReferenceLine y={0} stroke={P.muted} strokeDasharray="3 3" strokeWidth={1.5}/>
                  <XAxis type="number" dataKey="x" domain={[-10,110]} tick={false} axisLine={{stroke:P.line}} tickLine={false} label={{value:"← PRUDENT   AUDACIEUX →",position:"insideBottom",offset:-18,fontSize:8,fill:P.muted,fontFamily:"'Space Mono',monospace"}}/>
                  <YAxis type="number" dataKey="y" domain={[-85,52]} tick={false} axisLine={false} tickLine={false}/>
                  <Tooltip cursor={{stroke:P.line,strokeDasharray:"3 3"}} content={function(p){
                    if(!p.active||!p.payload||!p.payload.length)return null;
                    var d=p.payload[0].payload,r=nM>0?Math.round(d.correct/nM*100):0;
                    return<div style={Object.assign({},TT)}><p style={{fontWeight:700,marginBottom:6}}>#{d.rank} · {d.name}</p><p style={{color:P.muted,margin:"3px 0"}}>Score d'audace : {d.audace}%</p><p style={{color:P.muted,margin:"3px 0"}}>Taux de réussite : {r}%</p></div>;
                  }}/>
                  <Scatter data={SCAT} shape={<RD/>}/>
                </ScatterChart>
              </ResponsiveContainer>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {ZONES.map(function(z){var cnt=players.filter(function(p){return gz({x:p.audace,y:p.adjR})===z.key;}).length;return<div key={z.key} style={{padding:"10px 14px",border:"1px solid "+z.c,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><p className="mono" style={{color:z.c,fontSize:9,fontWeight:700,marginBottom:3}}>{z.label}</p><p className="mono" style={{color:P.muted,fontSize:7}}>{z.sub}</p></div><span className="mono" style={{color:z.c,fontSize:18,fontWeight:700}}>{cnt}</span></div>;})}
          </div>
        </div>}

        {/* PODIUM */}
        {tab==="Podium"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <Pod title="Meilleur boosteur" color={WHEEL[0]} players={players} data={players.map(function(p){return{name:p.name,val:p.boosters||0,unit:" pts"};})}/>
            <Pod title="Scores exacts" color={WHEEL[3]} players={players} data={players.map(function(p){return{name:p.name,val:p.exact||0};})}/>
            <Pod title="Les Oublis" color={WHEEL[1]} players={players} data={players.map(function(p){return{name:p.name,val:p.missedPronos||0,unit:" manqué"+(p.missedPronos!==1?"s":"")};})}/>
          </div>
        </div>}

      </div>
    </div>;
  }
  ReactDOM.render(React.createElement(App,null),document.getElementById("root"));
</script>
</body>
</html>
