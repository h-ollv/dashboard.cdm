<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pronostics CDM 2026 – Rattepit FC</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#F7F4EF}
    .mono{font-family:'Space Mono',monospace}
    .serif{font-family:'Cormorant Garamond',serif}
    button{font-family:inherit}
  </style>
</head>

<body>
<div id="root"></div>

<script>
var SHEET_ID = '1oEPk5uZSEESxbbc2gErFVoiggHqUj5sOWjWEqcGbJVQ';

var PLAYER_SHEETS = [
  "Dam's 1","Stan 1","Léna 1","Chloé 1","Jeje 1","Clara 1","Micka 1","Ricco 1",
  "Goyt 1","Noe 1","Pata 1","Marina 1","Vero 1","Erwan 1","Hugo 1","Shervan 1",
  "Laura 1","Greg 1","Nikola 1","Paco 1","Cyrille 1","Joris 1","Steph 1","Mathys 1",
  "Aymeric 1","Kalash 1","Jess 1","Hugo.O 1"
];

function norm(s){
  return s?s.toString().normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().trim():'';
}

function toNum(v){var n=parseFloat(v);return isNaN(n)?0:n;}

/* FIX IMPORTANT : gestion dates stable */
function dateVal(d){
  if(!d) return 0;
  return new Date(d).getTime();
}

function fetchSheet(name){
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+
    '/gviz/tq?tqx=out:json&headers=0&sheet='+encodeURIComponent(name);

  return fetch(url)
    .then(r=>r.text())
    .then(t=>{
      var m=t.match(/setResponse\(([\s\S]*)\);?\s*$/);
      if(!m) throw new Error('Réponse invalide pour "'+name+'"');
      var json=JSON.parse(m[1]);

      return (json.table.rows||[]).map(function(row){
        return (row.c||[]).map(function(cell){
          if(!cell||cell.v==null) return '';
          var v=cell.v;
          if(typeof v==='string' && v.indexOf('Date(')===0){
            var n=v.slice(5,-1).split(',').map(Number);
            return new Date(n[0],n[1],n[2]).toISOString().slice(0,10);
          }
          return v;
        });
      });
    });
}

function parseClassement(rows){
  var cl=[],qm={},mode='main';
  for(var i=1;i<80&&i<rows.length;i++){
    var r=rows[i]||[],name=r[1];
    if(!name) continue;
    if(typeof name==='string'&&name.indexOf('Points pris')===0){mode='qualif';continue;}
    if(name==='Joueurs') continue;

    var n=String(name).trim();

    if(mode==='main'){
      cl.push({
        name:n,
        correct:toNum(r[2]),
        exact:toNum(r[3]),
        points:toNum(r[5])
      });
    } else {
      qm[n]=toNum(r[2]);
    }
  }
  return{classement:cl,qualifMap:qm};
}

function parsePlayerSheet(rows){
  var name=(rows[0]&&rows[0][1])||'';
  if(typeof name==='string'&&name.indexOf('Joueur :')===0)
    name=name.replace('Joueur :','').trim();

  if(name==='Hugo.O') name='Hugo O.';

  var matches=[],block=[],curPoule=null;

  function flush(){
    if(!block.length) return;

    var teams={};
    block.forEach(function(r){
      if(r[0]&&r[0].indexOf('Equipe')===0&&r[1])
        teams[r[0].replace('Equipe','').trim()]=String(r[1]).trim();
    });

    block.forEach(function(r){
      var rencontre=r[4];
      if(!rencontre||rencontre.indexOf(' vs ')<0) return;

      var parts=rencontre.split(' vs ').map(s=>s.trim());

      matches.push({
        poule:curPoule,
        date:r[3]||null,
        match:rencontre,
        team_a:teams[parts[0]]||null,
        team_b:teams[parts[1]]||null,
        prono:(r[5]||'').toString().trim(),
        scorePred:(r[6]||'').toString().trim(),
        cote:(r[8]||'').toString().trim(),
        vainqueur:(r[9]||'').toString().trim(),
        points:toNum(r[12]),
        booster_pts:(r[11]||'').toString().toLowerCase()==='oui'?50:0,

        played:
          r[9]!=='' &&
          r[9]!=='...' &&
          r[9]!==null,

        correct:
          r[9]!=='' &&
          r[5]===r[9]
      });
    });
  }

  for(var i=5;i<rows.length;i++){
    var rw=rows[i]||[];
    if(rw[0]&&rw[0].indexOf('Poule')===0){
      flush();block=[];curPoule=rw[0];continue;
    }
    block.push(rw);
  }

  flush();

  return{name:name.trim()||null,matches:matches};
}

/* ---------------- RISK ---------------- */

function getAP(m){
  var prono=m.prono;
  if(!prono||prono==='...') return null;

  var cote=(m.cote||'').toLowerCase().trim();
  if(!cote) return null;

  var ASCORE={'-3':100,'-2':75,'-1':50,'0':25,'1':10,'2':5,'3':0};

  function ap(diff){
    var k=String(Math.max(-3,Math.min(3,diff)));
    return{a:ASCORE[k]||0};
  }

  if(prono.toUpperCase()==='N'){
    return{a:10};
  }

  var cp=cote.split('-').map(Number);
  if(cp.length!==2) return null;

  var pts=m.match.split(' vs ').map(s=>s.trim());
  var diff = prono===pts[0] ? cp[1]-cp[0] : cp[0]-cp[1];

  return ap(diff);
}

/* ---------------- MAIN LOAD ---------------- */

window.__loadAllData=function(){
  return Promise.all(
    [fetchSheet('Classement')]
      .concat(PLAYER_SHEETS.map(fetchSheet))
  ).then(function(results){

    var parsed=parseClassement(results[0]);
    var classement=parsed.classement;

    var pData={};

    results.slice(1).forEach(function(rows){
      var p=parsePlayerSheet(rows);
      if(p.name) pData[norm(p.name)]=p.matches;
    });

    var out=classement.map(function(e){
      var matches=pData[norm(e.name)]||[];

      var booster_pts = matches.reduce((s,m)=>s+(m.booster_pts||0),0);

      return {
        name:e.name,
        points:e.points,
        correct:e.correct,
        exact:e.exact,

        boosters:booster_pts,
        matches:matches
      };
    });

    return{players:out,nMatchs:0};
  });
};

/* ---------------- REACT CACHE FIX ---------------- */

var SCAT_CACHE=null;
var SCAT_KEY=null;

function buildScat(players,nM){
  var key = players.length + "_" + nM;
  if(SCAT_KEY===key) return SCAT_CACHE;

  SCAT_CACHE = players.map(function(p,i){
    var vx = Math.min(100, Math.max(0, (i*7)%100));
    var vy = Math.random()*20-10;

    return{
      name:p.name,
      audace:vx,
      adjR:vy
    };
  });

  SCAT_KEY = key;
  return SCAT_CACHE;
}
</script>

<script type="text/babel">

var useState=React.useState,useEffect=React.useEffect;

function App(){

  var _p=useState([]),players=_p[0],setPlayers=_p[1];
  var _l=useState(true),loading=_l[0],setLoading=_l[1];

  useEffect(function(){
    window.__loadAllData().then(function(r){

      var s=r.players
        .slice()
        .sort((a,b)=>b.points-a.points)
        .map((p,i)=>({...p,rank:i+1}));

      setPlayers(s);
      setLoading(false);

    });
  },[]);

  var SCAT = buildScat(players,players.length);

  return <div style={{padding:20}}>
    <h1>Optimisé</h1>

    {SCAT.map(p=>
      <div key={p.name}>
        {p.name} - {p.audace}
      </div>
    )}

  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>

</body>
</html>
