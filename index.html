<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pronostics CDM 2026 – Rattepit FC</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#F5F2EC}
    .mono{font-family:'Space Mono',monospace}
    .serif{font-family:'Cormorant Garamond',serif}
    button{font-family:inherit}
  </style>
</head>

<body>
<div id="root"></div>

<script>
var SHEET_ID = '1oEPk5uZSEESxbbc2gErFVoiggHqUj5sOWjWEqcGbJVQ';

var PLAYER_SHEETS = [
  "Dam's 1","Stan 1","Léna 1","Chloé 1","Jeje 1","Clara 1","Micka 1","Ricco 1",
  "Goyt 1","Noe 1","Pata 1","Marina 1","Vero 1","Erwan 1","Hugo 1","Shervan 1",
  "Laura 1","Greg 1","Nikola 1","Paco 1","Cyrille 1","Joris 1","Steph 1","Mathys 1",
  "Aymeric 1","Kalash 1","Jess 1","Hugo.O 1"
];

function norm(s){return s?s.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim():'';}
function toNum(v){var n=parseFloat(v);return isNaN(n)?0:n;}

function fetchSheet(name){
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&headers=0&sheet='+encodeURIComponent(name);
  return fetch(url).then(r=>r.text()).then(t=>{
    var m=t.match(/setResponse\(([\s\S]*)\);?\s*$/);
    var json=JSON.parse(m[1]);
    return (json.table.rows||[]).map(r=>(r.c||[]).map(c=>c?c.v:''));
  });
}

function parseClassement(rows){
  var cl=[],qm={},mode='main';
  for(var i=1;i<rows.length;i++){
    var r=rows[i]||[],name=r[1];
    if(!name) continue;
    if(String(name).indexOf('Points pris')===0){mode='qualif';continue;}
    if(mode==='main') cl.push({name:name,correct:toNum(r[2]),exact:toNum(r[3]),points:toNum(r[5])});
    else qm[name]=toNum(r[2]);
  }
  return{classement:cl,qualifMap:qm};
}

function parsePlayerSheet(rows){
  var name=(rows[0]&&rows[0][1])||'';
  var matches=[],block=[],curPoule=null;

  function flush(){
    if(!block.length) return;
    var teams={};

    block.forEach(r=>{
      if(r[0]&&r[0].indexOf('Equipe')===0) teams[r[0].replace('Equipe','').trim()]=r[1];
    });

    block.forEach(r=>{
      var rencontre=r[4];
      if(!rencontre||rencontre.indexOf(' vs ')<0) return;

      var parts=rencontre.split(' vs ');
      matches.push({
        poule:curPoule,
        match:rencontre,
        team_a:teams[parts[0]]||parts[0],
        team_b:teams[parts[1]]||parts[1],
        prono:(r[5]||'').toString().trim(),
        scorePred:(r[6]||'').toString().trim(),
        cote:(r[8]||'').toString().trim(),
        points:toNum(r[12]),
        played:true
      });
    });
  }

  for(var i=5;i<rows.length;i++){
    var rw=rows[i]||[];
    if(rw[0]&&rw[0].indexOf('Poule')===0){flush();block=[];curPoule=rw[0];continue;}
    block.push(rw);
  }
  flush();

  return{name:name,matches:matches};
}

function computeRisk(matches){
  var a=0,c=0;
  matches.forEach(m=>{a+=20;c++;});
  return{audace:c?Math.round(a/c):50,adjR:0};
}

window.__loadAllData=function(){
  return Promise.all([fetchSheet('Classement')].concat(PLAYER_SHEETS.map(fetchSheet)))
  .then(res=>{
    var parsed=parseClassement(res[0]);
    var players=res.slice(1).map(parsePlayerSheet);

    var out=parsed.classement.map(e=>{
      var matches=players.find(p=>norm(p.name)===norm(e.name))?.matches||[];
      return{
        name:e.name,
        points:e.points,
        correct:e.correct,
        exact:e.exact,
        matches:matches,
        audace:50,
        adjR:0
      };
    });

    return{players:out,nMatchs:matches.length};
  });
};
</script>

<script type="text/babel">

const P = {
  bg:"#F5F2EC",
  card:"#FFFFFF",
  text:"#111111",
  muted:"#6F6A63",
  line:"#E6E0D6"
};

const TABS=["Classement","Progression","Risques","Podium"];

function App(){

  const [players,setPlayers]=React.useState([]);
  const [tab,setTab]=React.useState("Classement");
  const [loading,setLoading]=React.useState(true);
  const [nM,setNM]=React.useState(0);

  React.useEffect(()=>{
    window.__loadAllData().then(r=>{
      setPlayers(r.players);
      setNM(r.nMatchs);
      setLoading(false);
    });
  },[]);

  if(loading){
    return <div style={{padding:40,fontFamily:"serif"}}>Chargement…</div>;
  }

  const leader = players[0]||{name:"—",points:0};

  return (
    <div style={{background:P.bg,minHeight:"100vh",padding:24}}>

      {/* HEADER DÉSAXÉ */}
      <div style={{
        display:"flex",
        justifyContent:"space-between",
        alignItems:"flex-start",
        borderBottom:"1px solid "+P.line,
        paddingBottom:16,
        marginBottom:20
      }}>

        <div>
          <h1 className="serif" style={{fontSize:28,fontWeight:400}}>
            Pronostics 2026
          </h1>
          <p className="mono" style={{fontSize:10,color:P.muted}}>
            Rattepit FC
          </p>
        </div>

        <div className="mono" style={{textAlign:"right",fontSize:10,color:P.muted}}>
          {players.length} joueurs<br/>
          {nM} matchs
        </div>

      </div>

      {/* LEADER BAR SIMPLE */}
      <div style={{
        display:"flex",
        justifyContent:"space-between",
        marginBottom:20
      }}>

        <div className="serif" style={{fontSize:18}}>
          {leader.name}
        </div>

        <div className="mono" style={{fontSize:12}}>
          <span style={{fontWeight:700}}>{leader.points}</span> pts
        </div>

      </div>

      {/* TABS */}
      <div style={{display:"flex",gap:10,borderBottom:"1px solid "+P.line,marginBottom:20}}>
        {TABS.map(t=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{
              background:"none",
              border:"none",
              padding:"8px 0",
              borderBottom:tab===t?"1px solid #111":"none",
              color:tab===t?"#111":P.muted,
              fontSize:10,
              letterSpacing:1
            }}>
            {t}
          </button>
        ))}
      </div>

      {/* CONTENT SIMPLE */}
      {tab==="Classement"&&(
        <div>
          {players.map((p,i)=>(
            <div key={p.name} style={{
              display:"flex",
              justifyContent:"space-between",
              padding:"8px 0",
              borderBottom:"1px solid "+P.line
            }}>
              <div className="serif">{p.name}</div>
              <div className="mono"><b>{p.points}</b></div>
            </div>
          ))}
        </div>
      )}

    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>

</body>
</html>
