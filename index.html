<script>
var SHEET_ID = '1oEPk5uZSEESxbbc2gErFVoiggHqUj5sOWjWEqcGbJVQ';
var PLAYER_SHEETS = [
  "Dam's 1","Stan 1","Léna 1","Chloé 1","Jeje 1","Clara 1","Micka 1","Ricco 1",
  "Goyt 1","Noe 1","Pata 1","Marina 1","Vero 1","Erwan 1","Hugo 1","Shervan 1",
  "Laura 1","Greg 1","Nikola 1","Paco 1","Cyrille 1","Joris 1","Steph 1","Mathys 1",
  "Aymeric 1","Kalash 1","Jess 1","Hugo.O 1"
];

function norm(s){return s?s.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim():'';}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function toNum(v){var n=parseFloat(v);return isNaN(n)?0:n;}

function fetchSheet(name){
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&headers=0&sheet='+encodeURIComponent(name);
  return fetch(url).then(function(r){return r.text();}).then(function(t){
    var m=t.match(/setResponse\(([\s\S]*)\);?\s*$/);
    if(!m) throw new Error('Réponse invalide pour "'+name+'"');
    var json=JSON.parse(m[1]);
    return (json.table.rows||[]).map(function(row){
      return (row.c||[]).map(function(cell){
        if(!cell||cell.v===null||cell.v===undefined) return '';
        var v=cell.v;
        if(typeof v==='string'&&v.indexOf('Date(')===0){
          var n=v.slice(5,-1).split(',').map(Number);
          return new Date(n[0],n[1],n[2]).toISOString().slice(0,10);
        }
        return v;
      });
    });
  });
}

function parseClassement(rows){
  var cl=[],qm={},mode='main';
  for(var i=1;i<80&&i<rows.length;i++){
    var r=rows[i]||[],name=r[1];
    if(!name) continue;
    if(typeof name==='string'&&name.indexOf('Points pris')===0){mode='qualif';continue;}
    if(name==='Joueurs') continue;
    var n=String(name).trim();
    if(mode==='main') cl.push({name:n,correct:toNum(r[2]),exact:toNum(r[3]),points:toNum(r[5])});
    else qm[n]=toNum(r[2]);
  }
  return{classement:cl,qualifMap:qm};
}

function parsePlayerSheet(rows){
  var name=(rows[0]&&rows[0][1])||'';
  if(typeof name==='string'&&name.indexOf('Joueur :')===0) name=name.replace('Joueur :','').trim();
  if(name==='Hugo.O') name='Hugo O.';
  var matches=[],block=[],curPoule=(rows[5]&&rows[5][0])||null;
  function flush(pouleLabel){
    if(!block.length) return;
    var teams={};
    block.forEach(function(r){
      if(r[0]&&typeof r[0]==='string'&&r[0].indexOf('Equipe')===0&&r[1])
        teams[r[0].replace('Equipe','').trim()]=String(r[1]).trim();
    });
    block.forEach(function(r){
      var rencontre=r[4];
      if(!rencontre||typeof rencontre!=='string'||rencontre.indexOf(' vs ')<0) return;
      var parts=rencontre.split(' vs ').map(function(s){return s.trim();});
      var prono       =(r[5] ||'').toString().trim();
      var scorePred   =(r[6] ||'').toString().trim(); /* G = score prédit */
      var boosterOui  =(r[11]||'').toString().trim().toLowerCase();
      var vainqueur   =(r[9] ||'').toString().trim();
      var played      = vainqueur!==''&&vainqueur!=='...'&&vainqueur!=='null';
      var correct     = played&&prono!==''&&prono!=='...'&&prono===vainqueur;
      var booster_pts = boosterOui==='oui'?50:0;
      matches.push({
        poule:pouleLabel, date:r[3]||null, match:rencontre,
        team_a:teams[parts[0]]||null, team_a_n:teams[parts[0]]?norm(teams[parts[0]]):null,
        team_b:teams[parts[1]]||null, team_b_n:teams[parts[1]]?norm(teams[parts[1]]):null,
        prono:prono, scorePred:scorePred,
        cote:(r[8]||'').toString().trim(),
        vainqueur:vainqueur, resultScore:(r[10]||'').toString().trim(),
        boosterLabel:(r[7]||'').toString().trim(),
        booster_pts:booster_pts,
        played:played, correct:correct,
        points:toNum(r[12])
      });
    });
  }
  for(var i=5;i<rows.length;i++){
    var rw=rows[i]||[];
    if(rw[0]&&typeof rw[0]==='string'&&rw[0].indexOf('Poule')===0){var prevPoule=curPoule;flush(prevPoule);block=[];curPoule=rw[0];continue;}
    block.push(rw);
  }
  flush(curPoule);
  return{name:name.trim()||null,matches:matches};
}

function getAP(m){
  var prono=m.prono;
  if(!prono||prono==='...') return null;

  var cote=(m.cote||'').toLowerCase().trim();
  if(!cote||cote==='...') return null;

  var ASCORE={'-3':100,'-2':75,'-1':50,'0':25,'1':10,'2':5,'3':0};
  var PSCORE={'-3':0.10,'-2':0.20,'-1':0.35,'0':0.50,'1':0.62,'2':0.72,'3':0.82};

  function ap(diff){
    var k=String(Math.max(-3,Math.min(3,diff)));
    return{a:ASCORE[k]||0,p:PSCORE[k]||0.50};
  }

  if(prono.toUpperCase()==='N'){

  if(cote==='nul')
    return {a:25,p:0.26};

  var np=cote.split('-').map(Number);

  if(np.length===2&&!isNaN(np[0])&&!isNaN(np[1])){

    var d=Math.abs(np[1]-np[0]);

    if(d<=1) return {a:25,p:0.26};
    if(d===2) return {a:60,p:0.18};
    if(d===3) return {a:100,p:0.12};
    if(d===4) return {a:130,p:0.08};

    return {a:150,p:0.05};
  }

  return {a:60,p:0.18};
}

  if(cote==='nul') return{a:25,p:0.50};

  var cp=cote.split('-').map(Number);
  if(cp.length!==2||isNaN(cp[0])||isNaN(cp[1])) return null;

  var pts=m.match.split(' vs ').map(function(s){return s.trim();});

  var diff;
  if(prono===pts[0])      diff=cp[1]-cp[0];
  else if(prono===pts[1]) diff=cp[0]-cp[1];
  else return null;

  return ap(diff);
}

function toVX(a){
  if(a<25) return (a/25)*50;
  return 50+((a-25)/75)*50;
}
  
function computeRisk(matches,socialMap){
  var aSum=0,aCnt=0;

  var weighted=0;
  var wSum=0;

  var actS=0,expS=0,pCnt=0;

  // distribution globale pour rareté relative
  var globalBuckets = {low:0,mid:0,high:0};

  var aps=[];
var socialSum=0,socialCnt=0;
  matches.forEach(function(m){
    var ap=getAP(m);
    if(!ap) return;

    aps.push(ap.a);

    var key=(m.match||'')+'|'+(m.date||'');

var total=0;
var same=0;

if(socialMap[key]){

  Object.values(socialMap[key]).forEach(function(v){
    total+=v;
  });

  same=socialMap[key][m.prono]||0;
}

var socialAudace=50;

if(total>0){
  socialAudace=(1-(same/total))*100;
}

var finalAudace=
  ap.a*0.6+
  socialAudace*0.4;

aSum+=finalAudace;
aCnt++;
socialSum+=socialAudace;
socialCnt++;

    if(ap.p<=0.30) globalBuckets.low++;
    else if(ap.p<=0.65) globalBuckets.mid++;
    else globalBuckets.high++;

    // --- pondération rareté (clé du modèle) ---
    var rarity = 1 / Math.max(0.12, ap.p);
    var weight = Math.pow(rarity, 1.35);

    weighted += ap.a * weight;
    wSum += weight;

    if(m.played){
      actS += m.correct ? 1 : 0;
      expS += ap.p;
      pCnt++;
    }
  });
  var meanForVar = aps.length ? aps.reduce(function(s,v){return s+v;},0)/aps.length : 50;
  var variance = 0;
  if(aps.length){
    var sq=aps.reduce(function(s,v){return s+Math.pow(v-meanForVar,2);},0)/aps.length;
    variance=Math.sqrt(sq);
  }

  var audaceRaw = aCnt ? aSum/aCnt : 50;
  audaceRaw = Math.max(0, Math.min(100, audaceRaw));

  var playedM=matches.filter(function(m){return m.played&&m.prono&&m.prono!=='...';});
  var correctM=playedM.filter(function(m){return m.correct;});
  var perfBrute=playedM.length?(correctM.length/playedM.length):0;
  var perfRaw=Math.min(100,perfBrute/0.65*100);

  var precSum=0,precCnt=0;
  matches.forEach(function(m){
    if(!m.played||!m.scorePred||m.scorePred==='...'||!m.resultScore||m.resultScore==='...') return;
    var sp=m.scorePred.toString().replace(/\s/g,'').split(/[-:]/).map(Number);
    var sr=m.resultScore.toString().replace(/\s/g,'').split(/[-:]/).map(Number);
    if(sp.length!==2||sr.length!==2||isNaN(sp[0])||isNaN(sp[1])||isNaN(sr[0])||isNaN(sr[1])) return;
    precSum+=Math.max(0,1-(Math.abs(sp[0]-sr[0])+Math.abs(sp[1]-sr[1]))/6); precCnt++;
  });
  var precRaw=precCnt?(precSum/precCnt)*100:50;

  var volRaw=Math.min(100,variance);

  var last10=playedM.sort(function(a,b){return (a.date||'')<(b.date||'')?-1:1;}).slice(-10);
  var correct10=last10.filter(function(m){return m.correct;}).length;
  var wrong10=last10.filter(function(m){return !m.correct;}).length;

  var socialAvg=socialCnt?socialSum/socialCnt:50;

  return {
    audaceRaw: audaceRaw,
    perfRaw: perfRaw,
    precRaw: precRaw,
    volRaw: volRaw,
    audaceSociale: socialAvg,
    last10len: last10.length,
    correct10: correct10,
    wrong10: wrong10
  };
}

var ARCHETYPES=[
  {name:"GOAT",          canC:false, s:[95,95,95,5]},
  {name:"Visionnaire",   canC:true,  s:[80,80,65,20]},
  {name:"Maestro",       canC:false, s:[55,80,90,5]},
  {name:"Plat du Pied",  canC:true,  s:[25,80,70,8]},
  {name:"Bras Cassé",    canC:true,  s:[60,80,15,50]},
  {name:"Titulaire",     canC:false, s:[45,55,48,22]},
  {name:"Réserviste",    canC:false, s:[10,42,65,5]},
  {name:"Électron Libre",canC:false, s:[80,30,20,90]},
  {name:"Fou du Bus",    canC:true,  s:[80,5,25,50]},
  {name:"Pied Carré",    canC:true,  s:[10,10,15,25]},
  {name:"Touriste",      canC:false, s:[5,5,5,5]}
];
function getArchetype(a,p,pr,v){
  var s=[a,p,pr,v];
  var dists=ARCHETYPES.map(function(arch){
    var d=Math.sqrt(Math.pow(s[0]-arch.s[0],2)+Math.pow(s[1]-arch.s[1],2)+Math.pow(s[2]-arch.s[2],2)+Math.pow(s[3]-arch.s[3],2));
    return{d:d,arch:arch};
  }).sort(function(x,y){return x.d-y.d;});
  var best=dists[0];
  if(best.arch.name==="Titulaire"&&dists.length>1){
    var second=dists[1];
    if(best.d>=second.d-15) return second.arch;
  }
  return best.arch;
}

window.__loadAllData=function(){
  return Promise.all(
    [fetchSheet('Classement')].concat(PLAYER_SHEETS.map(fetchSheet))
  ).then(function(results){
    var parsed=parseClassement(results[0]);
    var classement=parsed.classement,qualifMap=parsed.qualifMap;

    var pData={};
    results.slice(1).forEach(function(rows){
      var p=parsePlayerSheet(rows);
      if(p.name) pData[norm(p.name)]=p.matches;
    });

    var socialMap={};

Object.values(pData).forEach(function(matches){

  matches.forEach(function(m){

    if(!m.prono || m.prono==='...') return;

    var key=(m.match||'')+'|'+(m.date||'');

    if(!socialMap[key])
      socialMap[key]={};

    if(!socialMap[key][m.prono])
      socialMap[key][m.prono]=0;

    socialMap[key][m.prono]++;

  });

});

    var refKey=Object.keys(pData).find(function(k){return pData[k].length>0;})||'';
    var refM=pData[refKey]||[];

    var nMatchsJoues=refM.filter(function(m){return m.played;}).length;

    var byDate={};
refM.forEach(function(m){
  if(!m.date)return;
  if(!byDate[m.date])byDate[m.date]=[];
  byDate[m.date].push(m);
});

var allDates=Object.keys(byDate).sort();

var playedDates=allDates.filter(function(d){
  return byDate[d].some(function(m){return m.played;});
});

var completedDates=allDates.filter(function(d){
  return byDate[d].length>0&&byDate[d].every(function(m){return m.played;});
});

/* progression classement = match précédent */
var playedMatches=refM
  .filter(function(m){return m.played&&m.date;})
  .sort(function(a,b){
    if(a.date!==b.date) return a.date<b.date?-1:1;
    return 0;
  });

var lastPlayedMatch=playedMatches.length;
var previousPlayedMatch=Math.max(0,lastPlayedMatch-1);

    function cumPts(matches,upto){
  if(!upto)return 0;
  return matches.reduce(function(s,m){
    return s+(m.date&&m.date<=upto?m.points:0);
  },0);
}

function cumPtsMatch(matches,n){
  var played=matches
    .filter(function(m){return m.played;})
    .sort(function(a,b){
      if(a.date!==b.date) return a.date<b.date?-1:1;
      return 0;
    });

  return played.slice(0,n).reduce(function(s,m){
    return s+(m.points||0);
  },0);
}

    var rawAll=classement.map(function(e){
    var matches=pData[norm(e.name)]||[];
    return computeRisk(matches,socialMap);
  });
  var audArr=rawAll.map(function(x){return x.audaceRaw;});
  var perfArr=rawAll.map(function(x){return x.perfRaw;});
  var precArr=rawAll.map(function(x){return x.precRaw;});
  var volArr=rawAll.map(function(x){return x.volRaw;});
  function minmax(arr,v){
    var mn=Math.min.apply(null,arr),mx=Math.max.apply(null,arr);
    if(mx===mn) return 50;
    return Math.round((v-mn)/(mx-mn)*100);
  }

  var out=classement.map(function(e){
      var matches=pData[norm(e.name)]||[];
      var total_points=e.points||0;
      var booster_pts=matches.reduce(function(s,m){return s+(m.booster_pts||0);},0);
      var risk=rawAll[classement.indexOf(e)];
      var a10=minmax(audArr,risk.audaceRaw);
      var p10=minmax(perfArr,risk.perfRaw);
      var pr10=minmax(precArr,risk.precRaw);
      var v10=minmax(volArr,risk.volRaw);
      var arch=getArchetype(a10,p10,pr10,v10);
      var modifier=null;
      if(risk.audaceSociale>=40) modifier="Rebelle";
      else if(pr10-p10>=20) modifier="Poissard";
      else if(arch.canC&&v10>=60) modifier="Chaotique";
      else if(risk.last10len>=5&&risk.correct10>=7) modifier="En pétard";
      else if(risk.last10len>=5&&risk.wrong10>=7) modifier="En perte";
      var missedPronos=matches.filter(function(m){return m.played&&(!m.prono||m.prono==='...');}).length;

var playedM=matches.filter(function(m){return m.played&&m.prono&&m.prono!=='...';}).sort(function(a,b){return (a.date||'')<(b.date||'')?-1:((a.date||'')>(b.date||'')?1:0);});
var streakHot=0,streakCold=0;
for(var si=playedM.length-1;si>=0;si--){
  if(playedM[si].points>0){
    if(streakCold>0) break;
    streakHot++;
  }else{
    if(streakHot>0) break;
    streakCold++;
  }
}

var last5=playedM.slice(-5);
      var last5Pattern=last5.map(function(m){return m.points>0;});
      while(last5Pattern.length<5) last5Pattern.unshift(null);
var maxHot=0,maxCold=0;
var curHot=0,curCold=0;

playedM.forEach(function(m){
  if(m.points>0){
    curHot++;
    curCold=0;
    if(curHot>maxHot) maxHot=curHot;
  }else{
    curCold++;
    curHot=0;
    if(curCold>maxCold) maxCold=curCold;
  }
});
      return{
        name:e.name, points:total_points,
        correct:e.correct||0, exact:e.exact||0,
        boosters:booster_pts,
        audace:Math.round(risk.audaceRaw), adjR:Math.round((risk.perfRaw/100*170)-85),
        audace10:a10, perf10:p10, precision10:pr10, volatilite10:v10,
        archetype:arch.name, modifier:modifier,
        missedPronos:missedPronos, nMatchs:nMatchsJoues,
        streakHot:streakHot, streakCold:streakCold, last5Pattern:last5Pattern,
        maxHot:maxHot,
maxCold:maxCold,
lastMatchGain: playedM.length ? (playedM[playedM.length-1].points||0) : 0,
matches:matches,
        _ptsNow:cumPtsMatch(matches,lastPlayedMatch),
_ptsPrev:cumPtsMatch(matches,previousPlayedMatch)
      };
    });

    /* Delta rang */
    if(previousPlayedMatch>0){
      var bN=out.slice().sort(function(a,b){return b._ptsNow-a._ptsNow;});
      var bP=out.slice().sort(function(a,b){return b._ptsPrev-a._ptsPrev;});
      var rN={},rP={};
      bN.forEach(function(p,i){rN[p.name]=i+1;});
      bP.forEach(function(p,i){rP[p.name]=i+1;});
      out.forEach(function(p){p.delta=(rP[p.name]||0)-(rN[p.name]||0);});
    } else {
      out.forEach(function(p){p.delta=0;});
    }

    /* Streak leader */
    var leaderPerDate=completedDates.map(function(d){
      var best=null,bestPts=-1;
      out.forEach(function(p){
        var pts=(qualifMap[p.name]||0)+cumPts(p.matches,d);
        if(pts>bestPts){bestPts=pts;best=p.name;}
      });
      return best;
    });
    out.forEach(function(p){p.streak=0;});
    if(leaderPerDate.length>=2){
      var topName=leaderPerDate[leaderPerDate.length-1];
      var streak=0;
      for(var i=leaderPerDate.length-1;i>=0;i--){
        if(leaderPerDate[i]===topName) streak++; else break;
      }
      if(streak>=2){
        var lp=out.find(function(p){return p.name===topName;});
        if(lp) lp.streak=streak;
      }
    }

    /* Pari le plus populaire — après out défini */
    var pronoCounts={};

out.forEach(function(player){

  (player.matches||[]).forEach(function(m){

    if(!m.prono||m.prono==='...'||!m.team_a||!m.team_b) return;
    if(!m.scorePred||m.scorePred==='...') return;

    var parts=(m.match||'').split(' vs ').map(function(s){return s.trim();});

    var teamName;

    if(m.prono.toUpperCase()==='N'){
      teamName='Match nul';
    }else if(m.prono===parts[0]){
      teamName=m.team_a;
    }else if(m.prono===parts[1]){
      teamName=m.team_b;
    }else{
      return;
    }

    var matchDisplay=m.team_a+' vs '+m.team_b;

    var key=
      matchDisplay+'|'+
      teamName+'|'+
      m.scorePred;

    if(!pronoCounts[key]){
      pronoCounts[key]={
        count:0,
        teamName:teamName,
        score:m.scorePred,
        matchDisplay:matchDisplay
      };
    }

    pronoCounts[key].count++;

  });

});

var topProno=null;

Object.keys(pronoCounts).forEach(function(k){
  if(!topProno || pronoCounts[k].count>topProno.count){
    topProno=pronoCounts[k];
  }
});

    /* Pari le plus improbable */
    var topImprobable=null,topAud=-1;
    out.forEach(function(player){
      (player.matches||[]).forEach(function(m){
        if(!m.prono||m.prono==='...'||m.prono.toUpperCase()==='N') return;
        if(!m.correct) return;
        var ap=getAP(m);
        if(!ap||ap.a<=topAud) return;
        topAud=ap.a;
        var parts=(m.match||'').split(' vs ').map(function(s){return s.trim();});
        var betTeam=m.prono===parts[0]?(m.team_a||parts[0]):(m.team_b||parts[1]);
        var oppTeam=m.prono===parts[0]?(m.team_b||parts[1]):(m.team_a||parts[0]);
        topImprobable={player:player.name,score:m.scorePred,betTeam:betTeam,oppTeam:oppTeam,audace:ap.a};
      });
    });

    var matchVotes={};

out.forEach(function(player){

  (player.matches||[]).forEach(function(m){

    if(!m.played||!m.team_a||!m.team_b) return;

    var key=m.poule+'|'+m.match;

    if(!matchVotes[key]){
      matchVotes[key]={
        poule:m.poule,
        match:m.match,
        team_a:m.team_a,
        team_b:m.team_b,
        vainqueur:m.vainqueur,
        a:0,
        n:0,
        b:0
      };
    }

    var parts=(m.match||'')
      .split(' vs ')
      .map(function(s){
        return s.trim();

    });

    return d;
  }

  return(

    <svg
      viewBox={"0 0 "+W+" "+H}
      style={{
        width:"100%",
        height:"auto",
        overflow:"visible"
      }}
    >

      {progData.map(function(row,i){

        return(
          <text
            key={"j"+i}
            x={X(i)}
            y={18}
            textAnchor="middle"
            fill={P.muted}
            fontSize="10"
            fontFamily="'Space Mono',monospace"
          >
            {row.j}
          </text>
        );
      })}

      {Array.from({length:players.length},function(_,i){

  return(
    <text
      key={"rank-"+i}
      x={0}
      y={Y(i+1)+4}
      textAnchor="middle"
      fill={P.muted}
      fontSize="11"
      fontFamily="'Space Mono',monospace"
    >
      {i+1}
    </text>
  );

})}

      {players.map(function(p,i){

        var hoverOn=hovered===p.name;

var active=
  hoverOn ||
  focused.length===0 ||
  focused.indexOf(p.name)>=0;
        var selected=focused.indexOf(p.name)>=0;

        var color=WHEEL[i%WHEEL.length];

        return(

          <g
  key={p.name}
  onClick={function(){tog(p.name);}}
  onMouseEnter={function(){setHovered(p.name);}}
  onMouseLeave={function(){setHovered(null);}}
  style={{cursor:"pointer"}}
>

            <path
              d={buildPath(p.name)}
              fill="none"
              stroke={color}
              strokeWidth={selected ? 5 : active ? 3 : 1}
              strokeOpacity={active ? 0.95 : 0.08}
              strokeLinecap="round"
            />

            {progData.map(function(row,j){

              return(
                <circle
                  key={p.name+"-"+j}
                  cx={X(j)}
                  cy={Y(row[p.name])}
                  r={selected ? 6 : 4}
                  fill={color}
                  opacity={active ? 1 : 0.08}
                />
                
              );
            })}
            {(focused.indexOf(p.name)>=0)
 && progData.map(function(row,j){

  return(
    <text
      key={"lbl-"+p.name+"-"+j}
      x={X(j)}
      y={Y(row[p.name])-12}
      textAnchor="middle"
      fill="#000"
      fontSize="11"
      fontFamily="'Space Mono',monospace"
      fontWeight="700"
    >
      {row[p.name]}
    </text>
  );

})}
            <text
              x={W-right+15}
              y={Y(progData[progData.length-1][p.name])+4}
              fill={P.text}
              fontSize="14"
              fontFamily="'Cormorant',serif"
              fontWeight={selected?700:400}
              opacity={active?1:0.15}
            >
              {p.name}
            </text>

          </g>
        );
      })}

    </svg>

  );
<div
  style={{
    display:"flex",
    justifyContent:"center",
    gap:40,
    marginTop:12,
    paddingTop:10,
    borderTop:"1px solid "+P.line
  }}
>

  {bestMove && (
    <div>

      <span
        className="mono"
        style={{
          color:P.muted,
          fontSize:8,
          letterSpacing:"0.12em",
          textTransform:"uppercase"
        }}
      >
        Meilleure progression :
      </span>

      {" "}

      <span
        className="serif"
        style={{
          color:P.text,
          fontSize:16
        }}
      >
        {bestMove.name}
      </span>

      {" "}

      <span
        className="mono"
        style={{
          color:"#2E8B57",
          fontSize:9
        }}
      >
        +{bestMove.delta} en {bestMove.journee}
      </span>

    </div>
  )}

  {worstMove && (
    <div>

      <span
        className="mono"
        style={{
          color:P.muted,
          fontSize:8,
          letterSpacing:"0.12em",
          textTransform:"uppercase"
        }}
      >
        Pire régression :
      </span>

      {" "}

      <span
        className="serif"
        style={{
          color:P.text,
          fontSize:16
        }}
      >
        {worstMove.name}
      </span>

      {" "}

      <span
        className="mono"
        style={{
          color:"#B22222",
          fontSize:9
        }}
      >
        {worstMove.delta} en {worstMove.journee}
      </span>

    </div>
  )}

</div>
})()}
              
            </div>}
        </div>}

        {/* RISQUES */}
        {tab==="Risques"&&(function(){
          var selList=focusedR.map(function(n){return players.find(function(p){return p.name===n;});}).filter(Boolean);
          return<div style={{display:"flex",flexDirection:"column",gap:14}}>
            <p className="mono" style={{color:P.muted,fontSize:7,letterSpacing:"0.18em"}}>SÉLECTIONNER UN JOUEUR</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {players.map(function(p,i){
                var col=WHEEL[i%WHEEL.length];
                var iF=focusedR.indexOf(p.name)>=0;
                return<button key={p.name} onClick={function(){setFocusedR(function(prev){
                  if(prev.indexOf(p.name)>=0) return prev.filter(function(x){return x!==p.name;});
                  if(prev.length>=2) return [prev[1],p.name];
                  return prev.concat([p.name]);
                });}}
                  style={{display:"flex",alignItems:"center",gap:4,padding:"2px 8px",cursor:"pointer",
                    border:"1px solid "+(iF?col:P.line),background:iF?col+"18":"transparent"}}>
                  <div style={{width:5,height:5,borderRadius:"50%",background:col}}/>
                  <span className="mono" style={{color:iF?col:P.text,fontSize:8,fontWeight:iF?700:400}}>{p.name}</span>
                </button>;
              })}
            </div>

            <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
            {selList.map(function(sel){
              var grad=getGradient(sel);
              return<div key={sel.name} style={{width:280,border:"1px solid "+P.line}}>
                <div style={{height:200,background:grad,position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {(function(){
                    var dims=[
                      {val:sel.audace10/100,angle:-90},
                      {val:sel.perf10/100,angle:0},
                      {val:sel.precision10/100,angle:90},
                      {val:sel.volatilite10/100,angle:180}
                    ];
                    var cx=90,cy=90,r=62;
                    function toRad(deg){return deg*Math.PI/180;}
                    var gridPts=function(lv){return dims.map(function(d){return(cx+r*lv*Math.cos(toRad(d.angle)))+","+(cy+r*lv*Math.sin(toRad(d.angle)));}).join(" ");};
                    var dataPts=dims.map(function(d){return(cx+r*d.val*Math.cos(toRad(d.angle)))+","+(cy+r*d.val*Math.sin(toRad(d.angle)));}).join(" ");
                    return<svg width={180} height={180} style={{position:"absolute"}}>
                      {[0.33,0.66,1].map(function(lv){return<polygon key={lv} points={gridPts(lv)} fill="none" stroke="rgba(255,255,255,0.35)" strokeWidth={1}/>;}) }
                      {dims.map(function(d,i){return<line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(toRad(d.angle))} y2={cy+r*Math.sin(toRad(d.angle))} stroke="rgba(255,255,255,0.3)" strokeWidth={1}/>;}) }
                      <polygon points={dataPts} fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.95)" strokeWidth={2}/>
                      {dims.map(function(d,i){return<circle key={i} cx={cx+r*d.val*Math.cos(toRad(d.angle))} cy={cy+r*d.val*Math.sin(toRad(d.angle))} r={3.5} fill="white"/>;}) }
                    </svg>;
                  })()}
                </div>
                <div style={{padding:"14px 18px",background:grad,backgroundSize:"100% 400%",backgroundPosition:"0 100%"}}>
                  <p className="serif" style={{fontSize:20,color:"#1a1814",fontWeight:600,textAlign:"center"}}>{sel.archetype}</p>
                  {sel.modifier&&<p className="mono" style={{fontSize:8,color:"#1a1814",textAlign:"center",letterSpacing:"0.1em",opacity:0.75,marginTop:2}}>{sel.modifier}</p>}
                </div>
                <div style={{padding:"16px 18px",background:P.card}}>
                  <p className="serif" style={{fontSize:17,color:P.text,marginBottom:10}}>{sel.name}</p>
                  {[
                    {label:"Audace",val:sel.audace10},
                    {label:"Performance",val:sel.perf10},
                    {label:"Précision",val:sel.precision10},
                    {label:"Volatilité",val:sel.volatilite10}
                  ].map(function(s){return<div key={s.label} style={{marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <span className="mono" style={{fontSize:8,color:P.muted}}>{s.label}</span>
                      <span className="mono" style={{fontSize:8,fontWeight:700,color:P.text}}>{s.val}/100</span>
                    </div>
                    <div style={{height:3,background:P.bg}}>
                      <div style={{height:"100%",width:s.val+"%",background:P.text}}/>
                    </div>
                  </div>;})}
                  <p className="mono" style={{fontSize:8,color:P.muted,marginTop:10}}>{sel.points} pts</p>
                </div>
              </div>;
            })}
            </div>
          </div>;
        })()}

        {/* PODIUM */}
        {tab==="Podium"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
<Pod
  title="Meilleur boosteur"
  color={WHEEL[0]}
  players={players}
  data={players.map(function(p){
    return {
      name:p.name,
      val:(p.boosters||0)/50,
      unit:""
    };
  })}
/>  
  <Pod title="Scores exacts" color={WHEEL[3]} players={players} data={players.map(function(p){return{name:p.name,val:p.exact||0};})}/>

  <Pod title="Plus longue série 🔥" color="#A8C490" players={players} data={players.map(function(p){return{name:p.name,val:p.maxHot||0};})}/>

  <Pod title="Plus longue série 🧊" color="#9BB6C9" players={players} data={players.map(function(p){return{name:p.name,val:p.maxCold||0};})}/>
</div>
{divergentData.length>0&&(function(){
            var poules=[...new Set(
  divergentData
    .map(function(v){ return v.poule; })
    .filter(function(p){
      return p && p!==null && p!=="null";
    })
)].sort();

            var filtered=divergentData.filter(function(v){return v.poule===filterPoule;});
            var GOLD="#C9A84C";
            var BAR=180;
            return<div style={{border:"1px solid "+P.line,padding:"16px 20px",background:P.card}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <p className="mono" style={{color:P.muted,fontSize:7,letterSpacing:"0.18em",fontWeight:700}}>PRONOS PAR MATCH</p>
                <select className="mono" onChange={function(e){setFilterPoule(e.target.value);}} value={filterPoule||''} style={{fontSize:9,padding:"3px 6px",border:"1px solid "+P.line,background:P.card,color:P.text}}>
                  {poules.map(function(p){
  return<option key={p} value={p}>
  {p==="Equipe A" ? "Groupe A" : p.replace("Poule","Groupe")}
</option>;
})}
                </select>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {filtered.map(function(v){
                  var parts=v.match.split(' vs ').map(function(s){return s.trim();});
                  var winA=v.vainqueur===parts[0],winB=v.vainqueur===parts[1],winN=!winA&&!winB&&v.vainqueur&&v.vainqueur!=='...';
                  var total=v.a+v.n+v.b||1;
                  var wA=Math.round(v.a/total*BAR),wN=Math.round(v.n/total*BAR),wB=BAR-wA-wN;
                  return<div key={v.match} style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center"}}>
                    <div style={{textAlign:"right"}}>
                      <span className="serif" style={{fontSize:14,color:winA?GOLD:P.text,fontWeight:winA?600:400}}>{v.team_a}</span>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <div style={{display:"flex",width:BAR,height:20,alignItems:"center"}}>
                        {v.a>0&&<div style={{flex:v.a,height:"100%",background:winA?"#C9A84C":"#F4C4A0",display:"flex",alignItems:"center",justifyContent:"center",minWidth:14,flexShrink:0}}>
                          <span className="mono" style={{fontSize:7,color:P.text,fontWeight:winA?700:400,lineHeight:1}}>{v.a}</span>
                        </div>}
                        {v.n>0&&<div style={{flex:v.n,height:"100%",background:"#E8E4D0",display:"flex",alignItems:"center",justifyContent:"center",minWidth:14,flexShrink:0}}>
                          <span className="mono" style={{fontSize:7,color:P.text,lineHeight:1}}>{v.n}</span>
                        </div>}
                        {v.b>0&&<div style={{flex:v.b,height:"100%",background:winB?"#C9A84C":"#A8E0C8",display:"flex",alignItems:"center",justifyContent:"center",minWidth:14,flexShrink:0}}>
                          <span className="mono" style={{fontSize:7,color:P.text,fontWeight:winB?700:400,lineHeight:1}}>{v.b}</span>
                        </div>}
                      </div>
                    </div>
                    <div style={{textAlign:"left"}}>
                      <span className="serif" style={{fontSize:14,color:winB?GOLD:P.text,fontWeight:winB?600:400}}>{v.team_b}</span>
                    </div>
                  </div>;
                })}
              </div>
            </div>;
          })()}
          {topProno&&<div style={{border:"1px solid "+P.line,padding:"16px 20px",background:P.card}}>
            <p className="mono" style={{color:P.muted,fontSize:7,letterSpacing:"0.18em",fontWeight:700,marginBottom:10}}>PARI LE PLUS POPULAIRE</p>
            <p className="serif" style={{color:P.text,fontSize:17,lineHeight:1.5}}>
  <span style={{fontWeight:600}}>
    {topProno.count} joueurs
  </span>{' '}
  ont pronostiqué{' '}
  <span style={{color:P,fontWeight:600}}>
    {topProno.teamName}
  </span>{' '}
  <span style={{color:P,fontSize:10}} className="mono">
    ({topProno.score})
  </span>{' '}
  dans le match{' '}
  <span style={{color:P}}>
    {topProno.matchDisplay}
  </span>
</p>
          </div>}
          {topImprobable&&<div style={{border:"1px solid "+P.line,padding:"16px 20px",background:P.card}}>
            <p className="mono" style={{color:P.muted,fontSize:7,letterSpacing:"0.18em",fontWeight:700,marginBottom:10}}>PARI LE PLUS IMPROBABLE · AUDACE {topImprobable.audace}%</p>
            <p className="serif" style={{color:P.text,fontSize:17,lineHeight:1.5}}>
              <span style={{fontWeight:600}}>{topImprobable.player}</span> a parié{' '}
              {topImprobable.score&&topImprobable.score!=='...'&&<span style={{color:P.muted}}>{topImprobable.score} </span>}
              pour <span style={{fontWeight:600}}>{topImprobable.betTeam}</span>{' '}
              contre <span style={{color:P.muted}}>{topImprobable.oppTeam}</span>
            </p>
          </div>}
        </div>}

      </div>
    </div>;
  }
  ReactDOM.render(React.createElement(App,null),document.getElementById("root"));
</script>
</body>
</html>
