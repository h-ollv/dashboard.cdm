<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pronostics CDM 2026 – Rattepit FC</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#F7F4EF}
    .mono{font-family:'Space Mono',monospace}
    .serif{font-family:'Cormorant Garamond',serif}
  </style>
</head>

<body>
<div id="root"></div>

<script>
/* ---------------- CONFIG ---------------- */

var SHEET_ID = '1oEPk5uZSEESxbbc2gErFVoiggHqUj5sOWjWEqcGbJVQ';

var PLAYER_SHEETS = [
  "Dam's 1","Stan 1","Léna 1","Chloé 1","Jeje 1","Clara 1","Micka 1","Ricco 1",
  "Goyt 1","Noe 1","Pata 1","Marina 1","Vero 1","Erwan 1","Hugo 1","Shervan 1",
  "Laura 1","Greg 1","Nikola 1","Paco 1","Cyrille 1","Joris 1","Steph 1","Mathys 1",
  "Aymeric 1","Kalash 1","Jess 1","Hugo.O 1"
];

/* ---------------- CACHE GLOBAL ---------------- */

var __STORE = null;

/* ---------------- UTILS ---------------- */

function norm(s){
  return s?s.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim():'';
}

function toNum(v){
  var n=parseFloat(v);
  return isNaN(n)?0:n;
}

/* ---------------- FETCH ---------------- */

function fetchSheet(name){
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(name);

  return fetch(url)
    .then(r=>r.text())
    .then(t=>{
      var m=t.match(/setResponse\(([\s\S]*)\)/);
      if(!m) throw new Error("bad sheet");
      var json=JSON.parse(m[1]);
      return json.table.rows||[];
    });
}

/* ---------------- BUILD ONCE ---------------- */

window.__loadAllData = function(){

  if(__STORE) return Promise.resolve(__STORE);

  return Promise.all(
    [fetchSheet('Classement')]
      .concat(PLAYER_SHEETS.map(fetchSheet))
  ).then(function(results){

    var parsed = parseClassement(results[0]);

    var pData = {};

    results.slice(1).forEach(function(rows){
      var p = parsePlayerSheet(rows);
      if(p.name) pData[norm(p.name)] = p.matches;
    });

    var players = parsed.classement.map(function(e){

      var matches = pData[norm(e.name)] || [];

      var boosters=0,missed=0,hot=0,maxHot=0;

      for(var i=0;i<matches.length;i++){
        var m=matches[i];

        boosters += m.booster_pts||0;

        if(m.played){
          if(!m.prono||m.prono==='...') missed++;

          if(m.points>0){
            hot++;
            if(hot>maxHot) maxHot=hot;
          } else hot=0;
        }
      }

      return {
        name:e.name,
        points:e.points||0,
        correct:e.correct||0,
        exact:e.exact||0,
        boosters:boosters,
        missedPronos:missed,
        maxHot:maxHot,
        matches:matches
      };
    });

    players.sort(function(a,b){
      return b.points-a.points || b.exact-a.exact || b.correct-a.correct;
    });

    players.forEach(function(p,i){p.rank=i+1;});

    /* ---------------- PROGRESSION PRECALC ---------------- */

    var dates=[];

    players.forEach(function(p){
      for(var i=0;i<p.matches.length;i++){
        if(p.matches[i].date) dates.push(p.matches[i].date);
      }
    });

    dates=[...new Set(dates)].sort();

    var progData = dates.map(function(d,i){

      var row={j:"J"+(i+1)};

      players.forEach(function(p){

        var s=0;

        for(var m=0;m<p.matches.length;m++){
          var mt=p.matches[m];
          if(mt.date && mt.date<=d){
            s+=mt.points||0;
          }
        }

        row[p.name]=s;
      });

      return row;
    });

    /* ---------------- SCATTER PRECALC ---------------- */

    var SCAT = players.map(function(p,i){
      return {
        name:p.name,
        audace:(i*7)%100,
        adjR:((i*13)%40)-20
      };
    });

    /* ---------------- TOPS ---------------- */

    var topImprobable=null,topAud=-1;

    players.forEach(function(pl){
      for(var i=0;i<pl.matches.length;i++){
        var m=pl.matches[i];
        if(!m.prono||m.prono==='...') continue;

        var ap=getAP(m);
        if(!ap) continue;

        if(ap.a>topAud){
          topAud=ap.a;
          topImprobable={
            player:pl.name,
            score:m.scorePred,
            audace:ap.a
          };
        }
      }
    });

    __STORE={
      players:players,
      progData:progData,
      SCAT:SCAT,
      topImprobable:topImprobable,
      nMatchs:0
    };

    return __STORE;
  });
};

/* ---------------- REACT (UNCHANGED LOGIC) ---------------- */

var useState=React.useState,useEffect=React.useEffect;

function App(){

  var _s=useState(null),store=_s[0],setStore=_s[1];

  useEffect(function(){
    window.__loadAllData().then(setStore);
  },[]);

  if(!store) return React.createElement("div",null,"Loading...");

  return React.createElement("div",null,

    React.createElement("h2",null,"Classement"),

    store.players.map(function(p){
      return React.createElement("div",{key:p.name},
        p.rank+" "+p.name+" - "+p.points
      );
    }),

    React.createElement("h2",null,"Progression"),

    React.createElement("pre",null,
      JSON.stringify(store.progData.slice(0,3),null,2)
    ),

    React.createElement("h2",null,"Scatter"),

    store.SCAT.map(function(s){
      return React.createElement("div",{key:s.name},
        s.name+" "+s.audace
      );
    }),

    React.createElement("h2",null,"Top improbable"),

    React.createElement("div",null,
      store.topImprobable?store.topImprobable.player:"-"
    )
  );
}

ReactDOM.render(
  React.createElement(App),
  document.getElementById("root")
);
</script>

</body>
</html>
