
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Debug Sheet</title>
  <style>
    body{font-family:monospace;font-size:11px;background:#111;color:#eee;padding:16px;}
    h2{color:#F0C070;margin:16px 0 6px;}
    table{border-collapse:collapse;margin-bottom:24px;width:100%;}
    th{background:#333;padding:4px 8px;text-align:left;color:#F0C070;}
    td{padding:3px 8px;border-bottom:1px solid #333;}
    .idx{color:#888;}
    .val{color:#A8D0C0;}
    .empty{color:#555;}
    .section{background:#1a1a1a;padding:12px;margin-bottom:16px;border-left:3px solid #F0C070;}
    button{background:#333;color:#eee;border:1px solid #555;padding:6px 12px;cursor:pointer;font-family:monospace;margin-right:8px;margin-bottom:8px;}
    button:hover{background:#444;}
    #status{color:#E8A098;margin-bottom:12px;}
  </style>
</head>
<body>
<h1 style="color:#F0C070">🔍 Debug — Lecture du Google Sheet</h1>
<p id="status">Chargement...</p>

<div id="out"></div>

<script>
var SHEET_ID = '1oEPk5uZSEESxbbc2gErFVoiggHqUj5sOWjWEqcGbJVQ';

/* Onglet à inspecter — change ce nom pour tester d'autres joueurs */
var PLAYER_TAB = "Joris 1";

function fetchSheet(name){
  var url = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&headers=0&sheet='+encodeURIComponent(name);
  return fetch(url).then(function(r){return r.text();}).then(function(t){
    var m = t.match(/setResponse\(([\s\S]*)\);?\s*$/);
    if(!m) throw new Error('Réponse invalide pour "'+name+'"');
    var json = JSON.parse(m[1]);
    return (json.table.rows||[]).map(function(row){
      return (row.c||[]).map(function(cell){
        if(!cell||cell.v===null||cell.v===undefined) return null;
        var v = cell.v;
        if(typeof v==='string'&&v.indexOf('Date(')===0){
          var n=v.slice(5,-1).split(',').map(Number);
          return new Date(n[0],n[1],n[2]).toISOString().slice(0,10);
        }
        return v;
      });
    });
  });
}

function cell(v){
  if(v===null||v===undefined||v==='') return '<span class="empty">—</span>';
  return '<span class="val">'+String(v).slice(0,30)+'</span>';
}

function renderRows(rows, title, maxRows){
  var n = maxRows||rows.length;
  var html = '<div class="section"><h2>'+title+' ('+rows.length+' lignes)</h2>';
  html += '<table><tr><th>#</th>';
  /* En-têtes colonnes A-P */
  for(var c=0;c<16;c++) html += '<th>'+'ABCDEFGHIJKLMNOP'[c]+'<br/><span class="idx">r['+c+']</span></th>';
  html += '</tr>';
  for(var i=0;i<Math.min(n,rows.length);i++){
    var r = rows[i]||[];
    html += '<tr><td class="idx">'+i+'</td>';
    for(var c=0;c<16;c++) html += '<td>'+cell(r[c])+'</td>';
    html += '</tr>';
  }
  html += '</table></div>';
  return html;
}

function renderClassement(rows){
  var html = '<div class="section"><h2>Onglet Classement — premières lignes</h2>';
  html += '<table><tr><th>#</th>';
  for(var c=0;c<8;c++) html += '<th>'+'ABCDEFGH'[c]+' r['+c+']</th>';
  html += '</tr>';
  for(var i=0;i<Math.min(35,rows.length);i++){
    var r=rows[i]||[];
    html += '<tr><td class="idx">'+i+'</td>';
    for(var c=0;c<8;c++) html += '<td>'+cell(r[c])+'</td>';
    html += '</tr>';
  }
  html += '</table></div>';
  return html;
}

function renderPlayerAnalysis(rows){
  /* Chercher les lignes avec " vs " pour identifier les matchs */
  var matchRows = rows.filter(function(r){
    return r&&r.some(function(v){return typeof v==='string'&&v.indexOf(' vs ')>=0;});
  });

  var html = '<div class="section"><h2>Lignes contenant " vs " (matchs détectés)</h2>';
  html += '<p style="color:#aaa;margin-bottom:8px;">'+matchRows.length+' lignes trouvées</p>';
  html += '<table><tr><th>#ligne</th>';
  for(var c=0;c<16;c++) html += '<th>'+'ABCDEFGHIJKLMNOP'[c]+' r['+c+']</th>';
  html += '</tr>';

  var rowIdx = [];
  rows.forEach(function(r,i){if(r&&r.some(function(v){return typeof v==='string'&&v.indexOf(' vs ')>=0;})) rowIdx.push(i);});

  rowIdx.slice(0,8).forEach(function(i){
    var r=rows[i]||[];
    html += '<tr><td class="idx">'+i+'</td>';
    for(var c=0;c<16;c++) html += '<td>'+cell(r[c])+'</td>';
    html += '</tr>';
  });
  html += '</table>';

  /* Résumé des colonnes non-vides dans ces lignes */
  html += '<h2 style="margin-top:12px">Colonnes non-vides dans les lignes matchs</h2>';
  html += '<table><tr><th>Colonne</th><th>Exemples de valeurs</th></tr>';
  for(var c=0;c<16;c++){
    var vals=[];
    rowIdx.slice(0,5).forEach(function(i){var v=(rows[i]||[])[c];if(v!==null&&v!==undefined&&v!=='')vals.push(String(v).slice(0,20));});
    if(vals.length>0){
      html += '<tr><td><b>'+'ABCDEFGHIJKLMNOP'[c]+'</b> = r['+c+']</td><td class="val">'+vals.join(' | ')+'</td></tr>';
    }
  }
  html += '</table></div>';
  return html;
}

document.getElementById('status').textContent = 'Lecture des onglets...';

Promise.all([
  fetchSheet('Classement'),
  fetchSheet(PLAYER_TAB)
]).then(function(results){
  var clRows = results[0];
  var playerRows = results[1];
  var out = document.getElementById('out');

  var html = '';

  /* Classement */
  html += renderClassement(clRows);

  /* Onglet joueur - premières lignes brutes */
  html += renderRows(playerRows, 'Onglet "'+PLAYER_TAB+'" — lignes 0 à 25', 26);

  /* Analyse des lignes match */
  html += renderPlayerAnalysis(playerRows);

  out.innerHTML = html;
  document.getElementById('status').textContent = '✓ Terminé — '+clRows.length+' lignes classement, '+playerRows.length+' lignes joueur';
}).catch(function(e){
  document.getElementById('status').textContent = '⚠ Erreur : '+e.message;
  console.error(e);
});
</script>
</body>
</html>
