<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pronostics CDM 2026 – Rattepit FC</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#F6F3EE}
    .serif{font-family:'Cormorant Garamond',serif}
    .mono{font-family:'Space Mono',monospace}

    button{font-family:inherit}

    /* suppression du gras global */
    b,strong{font-weight:400}

    .num{font-weight:700}
  </style>
</head>

<body>
<div id="root"></div>

<script>
/* ===================== */
/* DATA UTILS (inchangé) */
/* ===================== */
var SHEET_ID = '1oEPk5uZSEESxbbc2gErFVoiggHqUj5sOWjWEqcGbJVQ';
var PLAYER_SHEETS=[/* inchangé */];

function norm(s){return s?s.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim():'';}
function toNum(v){var n=parseFloat(v);return isNaN(n)?0:n;}

function fetchSheet(name){
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&headers=0&sheet='+encodeURIComponent(name);
  return fetch(url).then(r=>r.text()).then(t=>{
    var m=t.match(/setResponse\(([\s\S]*)\);?\s*$/);
    var json=JSON.parse(m[1]);
    return (json.table.rows||[]).map(row=>(row.c||[]).map(c=>c?c.v:''));
  });
}

/* ===================== */
/* PALETTE NEUTRE EDITO  */
/* ===================== */
var P={
  bg:"#F6F3EE",
  card:"#FFFFFF",
  text:"#111111",
  muted:"#6F6A63",
  line:"#E6E0D8"
};

/* ===================== */
/* APP UI               */
/* ===================== */
var useState=React.useState,useEffect=React.useEffect;

function App(){

  var _p=useState([]),players=_p[0],setPlayers=_p[1];
  var _l=useState(true),loading=_l[0],setLoading=_l[1];
  var _e=useState(null),error=_e[0],setError=_e[1];
  var _t=useState("Classement"),tab=_t[0],setTab=_t[1];

  useEffect(function(){
    window.__loadAllData().then(function(r){
      setPlayers(r.players.sort((a,b)=>b.points-a.points));
      setLoading(false);
    }).catch(e=>{
      setError(e.message);
      setLoading(false);
    });
  },[]);

  var leader=players[0]||{name:"—",points:0};

  if(loading) return <div style={{padding:40}}>Chargement...</div>;
  if(error) return <div style={{padding:40}}>{error}</div>;

  return(
    <div style={{background:P.bg,minHeight:"100vh",padding:28}}>

      {/* ================= HEADER DESAXE ================= */}
      <div style={{
        display:"flex",
        justifyContent:"space-between",
        alignItems:"flex-end",
        borderBottom:"1px solid "+P.line,
        paddingBottom:18,
        marginBottom:22
      }}>

        <div>
          <p className="mono" style={{fontSize:8,letterSpacing:"0.2em",color:P.muted}}>
            COUPE DU MONDE 2026 · RATTEPIT FC
          </p>
          <h1 className="serif" style={{fontSize:34,color:P.text,fontWeight:400}}>
            Pronostics
          </h1>
        </div>

        <div style={{textAlign:"right"}}>
          <p className="serif" style={{fontSize:14,color:P.text}}>
            {leader.name}
          </p>
          <p className="mono num" style={{fontSize:10,color:P.muted}}>
            {leader.points} pts
          </p>
        </div>

      </div>

      {/* ================= TOP BAR ================= */}
      <div style={{
        display:"flex",
        justifyContent:"space-between",
        marginBottom:22
      }}>

        <div>
          <p className="serif">{leader.name}</p>
          <p className="mono num" style={{fontSize:10,color:P.muted}}>
            {leader.points} pts
          </p>
        </div>

        <div>
          <p className="mono">Matchs</p>
          <p className="mono num">—</p>
        </div>

        <div>
          <p className="mono">Série</p>
          <p className="mono num">—</p>
        </div>

      </div>

      {/* ================= TABS ================= */}
      <div style={{display:"flex",gap:16,borderBottom:"1px solid "+P.line,marginBottom:18}}>
        {["Classement","Progression","Risques","Podium"].map(t=>(
          <button
            key={t}
            onClick={()=>setTab(t)}
            style={{
              background:"none",
              border:"none",
              padding:"8px 0",
              fontFamily:"Space Mono",
              fontSize:9,
              color:tab===t?P.text:P.muted,
              borderBottom:tab===t?"1px solid "+P.text:"1px solid transparent"
            }}
          >
            {t}
          </button>
        ))}
      </div>

      {/* ================= CONTENT ================= */}
      {tab==="Classement" &&
        <div style={{background:P.card,padding:18,border:"1px solid "+P.line}}>
          {players.map((p,i)=>(
            <div key={p.name} style={{
              display:"flex",
              justifyContent:"space-between",
              padding:"6px 0",
              borderBottom:"1px solid "+P.line
            }}>
              <span className="serif">{p.name}</span>
              <span className="mono num">{p.points}</span>
            </div>
          ))}
        </div>
      }

      {tab==="Podium" &&
        <div style={{background:P.card,padding:18,border:"1px solid "+P.line}}>
          {players.slice(0,3).map((p,i)=>(
            <div key={p.name} style={{
              display:"flex",
              justifyContent:"space-between",
              padding:"8px 0"
            }}>
              <span className="serif">{i+1}. {p.name}</span>
              <span className="mono num">{p.points}</span>
            </div>
          ))}
        </div>
      }

    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
