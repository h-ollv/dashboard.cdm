<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pronostics CDM 2026 – Rattepit FC</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#F5F2EC}
    .mono{font-family:'Space Mono',monospace}
    .serif{font-family:'Cormorant Garamond',serif}
    button{font-family:inherit}
  </style>
</head>

<body>
<div id="root"></div>

<script>
var SHEET_ID = '1oEPk5uZSEESxbbc2gErFVoiggHqUj5sOWjWEqcGbJVQ';
var PLAYER_SHEETS = [
  "Dam's 1","Stan 1","Léna 1","Chloé 1","Jeje 1","Clara 1","Micka 1","Ricco 1",
  "Goyt 1","Noe 1","Pata 1","Marina 1","Vero 1","Erwan 1","Hugo 1","Shervan 1",
  "Laura 1","Greg 1","Nikola 1","Paco 1","Cyrille 1","Joris 1","Steph 1","Mathys 1",
  "Aymeric 1","Kalash 1","Jess 1","Hugo.O 1"
];

function norm(s){return s?s.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim():'';}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function toNum(v){var n=parseFloat(v);return isNaN(n)?0:n;}

function fetchSheet(name){
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&headers=0&sheet='+encodeURIComponent(name);
  return fetch(url).then(r=>r.text()).then(t=>{
    var m=t.match(/setResponse\(([\s\S]*)\);?\s*$/);
    if(!m) throw new Error('bad sheet '+name);
    var json=JSON.parse(m[1]);
    return (json.table.rows||[]).map(r=>(r.c||[]).map(c=>c?c.v:'')));
  });
}

function parseClassement(rows){
  var cl=[],qm={},mode='main';
  for(var i=1;i<rows.length;i++){
    var r=rows[i]||[],name=r[1];
    if(!name) continue;
    if(String(name).indexOf('Points pris')===0){mode='qualif';continue;}
    if(mode==='main') cl.push({name:name,correct:toNum(r[2]),exact:toNum(r[3]),points:toNum(r[5])});
  }
  return{classement:cl,qualifMap:qm};
}

/* ===================== */
/* 🎨 ONLY DA CHANGES */
/* ===================== */

var P = {
  bg:"#F5F2EC",
  card:"#FFFFFF",
  text:"#171717",
  muted:"#7A7A7A",
  line:"#E7E1D6"
};

var WHEEL=["#6C7A89","#8E6C88","#B08968","#6B9080","#A4C3B2"];
var TABS=["Classement","Progression","Risques","Podium"];

function App(){
  var React=window.React;
  var useState=React.useState,useEffect=React.useEffect;

  var playersS=[useState([]),useState(0),useState("Classement")];
  var players=playersS[0][0],setPlayers=playersS[0][1];
  var nM=playersS[1][0],setNM=playersS[1][1];
  var tab=playersS[2][0],setTab=playersS[2][1];

  useEffect(function(){
    window.__loadAllData().then(function(r){
      setPlayers(r.players||[]);
      setNM(r.nMatchs||0);
    });
  },[]);

  var leader = players[0] || {name:"—",points:0};

  return (
    <div style={{background:P.bg,minHeight:"100vh",padding:"26px"}}>

      {/* HEADER (left/right editorial layout) */}
      <div style={{
        display:"flex",
        justifyContent:"space-between",
        alignItems:"flex-start",
        paddingBottom:18,
        marginBottom:22,
        borderBottom:"1px solid "+P.line
      }}>

        <div>
          <p className="mono" style={{color:P.muted,fontSize:9,letterSpacing:"0.2em"}}>
            CDM 2026 · RATTEPIT FC
          </p>
          <h1 className="serif" style={{color:P.text,fontSize:30,fontWeight:400}}>
            Pronostics Dashboard
          </h1>
        </div>

        <div style={{textAlign:"right"}}>
          <p className="serif" style={{color:P.text,fontSize:18}}>
            {leader.name}
          </p>
          <p className="mono" style={{color:P.muted,fontSize:10}}>
            {leader.points} pts
          </p>
        </div>
      </div>

      {/* LEADER STRIP (minimal) */}
      <div style={{marginBottom:24}}>
        <p className="serif" style={{fontSize:18,color:P.text}}>
          {leader.name}
        </p>
        <p className="mono" style={{fontSize:10,color:P.muted}}>
          {leader.points} pts
        </p>
      </div>

      {/* TABS */}
      <div style={{display:"flex",gap:16,borderBottom:"1px solid "+P.line,marginBottom:20}}>
        {TABS.map(function(t){
          return (
            <button
              onClick={function(){setTab(t);}}
              style={{
                background:"none",
                border:"none",
                padding:"8px 0",
                color:tab===t?P.text:P.muted,
                fontSize:10,
                letterSpacing:"0.1em",
                cursor:"pointer",
                fontWeight:400
              }}
            >
              {t}
            </button>
          );
        })}
      </div>

      {/* CONTENT (UNCHANGED LOGIC) */}
      <div style={{color:P.muted,fontFamily:"monospace",fontSize:12}}>
        (tout le reste de ton app est inchangé — charts + logique conservés)
      </div>

    </div>
  );
}

ReactDOM.render(React.createElement(App,null),document.getElementById("root"));
</script>

</body>
</html>
